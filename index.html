<!--
    UNF Activity Calendar Subscription Page
    Functionality: Show ICS subscription links for UNF regional events, display data update time and current time
-->
<html lang="zh-cn">
	<head>
		<meta charset="UTF-8" />
		<title>Last Update Time</title>
		<style>
			/* Basic page style */
			body {
				font-family: Arial, sans-serif;
				margin: 40px;
			}

			/* Update time display style - large blue text */
			.update-time {
				font-size: 1.5em;
				color: #2d8cf0;
			}

			/* ICS link label style - fixed width alignment */
			label {
				display: inline-block;
				width: 240px;
			}

			/* Read-only input field style - bottom margin */
			input[readonly] {
				margin-bottom: 6px;
			}

			/* Table style - collapse borders */
			table {
				border-collapse: collapse;
				margin-top: 10px;
			}
			th,
			td {
				border: 1px solid #ccc;
				padding: 4px 8px;
				font-size: 14px;
			}
			th {
				background: #f5f5f5;
			}

			/* Dark mode - auto-enable from 18:00 to 06:00 */
			body.dark-mode {
				background: #1a1a1a;
				color: #e0e0e0;
			}
			body.dark-mode .update-time {
				color: #5dade2;
			}
			body.dark-mode input[readonly] {
				background: #2d2d2d;
				color: #e0e0e0;
				border: 1px solid #444;
			}
			body.dark-mode th,
			body.dark-mode td {
				border-color: #444;
			}
			body.dark-mode th {
				background: #2d2d2d;
			}
		</style>
	</head>
	<body>
		<script>
			// Detect time and auto-enable dark mode (18:00-06:00)
			const hour = new Date().getHours();
			if (hour >= 18 || hour < 6) {
				document.body.classList.add("dark-mode");
			}
		</script>
		<h1>UNF-Aktivite-ics</h1>

		<!-- Data last update time area - Shows the time when the crawler last fetched data -->
		<h2>Data Last Update Time</h2>
		<div class="update-time" id="update-time">
			<!-- Copenhagen time is inserted by the Python backend script -->
			<span id="last-update">Copenhagen: 2026-03-21 12:00:00</span>
		</div>

		<!-- Current time area - Shows the user browser's local time and timezone -->
		<h2>Current Time</h2>
		<div style="font-size: 1.2em; color: #52c41a; margin-bottom: 20px">
			<!-- Current time updates automatically every minute -->
			<span id="current-time-ref"></span>
		</div>

		<!-- ICS subscription links area - Dynamically generate calendar subscription links for each region -->
		<h2>ICS subscription links</h2>
		<div id="ics-links"></div>

		<!-- Published file list area - File list is dynamically inserted by the Python script -->
		<h2>Published Files</h2>
		<div id="file-list">
			<!-- FILE_LIST_START -->
			<span id="no-files" style="color: #888"></span>
			<!-- FILE_LIST_END -->
		</div>

		<script>
			/**
			 * Auto-refresh functionality
			 * Refreshes the page every 5 minutes (300000 ms) to ensure latest data is shown
			 */
			setInterval(function () {
				location.reload();
			}, 300000);

			/**
			 * ICS subscription link generator
			 * Functionality: Dynamically generates calendar subscription links for each UNF region
			 * Note: File names must sync with the Python script output
			 */

			// UNF regional configurations - 'slug' is used for file generation, 'name' for display
			const icsFiles = [
				{ slug: "kbh", name: "UNF København" }, // Copenhagen
				{ slug: "lyngby", name: "UNF Lyngby" }, // Lyngby
				{ slug: "aarhus", name: "UNF Aarhus" }, // Aarhus
				{ slug: "odense", name: "UNF Odense" }, // Odense
				{ slug: "aalborg", name: "UNF Aalborg" }, // Aalborg
				{ slug: "danmark", name: "UNF Danmark" }, // All Denmark
				{ slug: "all", name: "ALLE Arrangementer" },
			];

			// GitHub Pages base URL
			const baseUrl = `https://teddypyf.github.io/UNF-Aktivite-Web-Scraper/`;

			// Generate HTML: One label and one clickable read-only input field per region
			let html = "";
			icsFiles.forEach((f, i) => {
				// No pizza link
				const fname = `unf_events_${f.slug}.ics`;
				html += `<div><label for="ics-link${i}">${f.name}:</label>`;
				html += `<input id="ics-link${i}" type="text" value="${baseUrl}${fname}" readonly style="width:500px;" onclick="this.select()" />`;
				html += `<button type="button" onclick="navigator.clipboard.writeText(document.getElementById('ics-link${i}').value)">copy link</button></div>`;

				// Pizza link
				const fname_pizza = `unf_events_${f.slug}_pizza.ics`;
				html += `<div style="margin-bottom: 12px;"><label for="ics-link${i}_pizza">${f.name} (🍕):</label>`;
				html += `<input id="ics-link${i}_pizza" type="text" value="${baseUrl}${fname_pizza}" readonly style="width:500px;" onclick="this.select()" />`;
				html += `<button type="button" onclick="navigator.clipboard.writeText(document.getElementById('ics-link${i}_pizza').value)">copy link</button></div>`;
			});

			// Insert generated links into the page
			document.getElementById("ics-links").innerHTML = html;
		</script>
		<script>
			/**
			 * Time formatting and real-time display module
			 */

			// Get page elements
			const currentRefSpan = document.getElementById("current-time-ref"); // Current time display element

			/**
			 * Time formatting function
			 * @param {Date} d - Date object
			 * @returns {string} Formatted time string (yyyy-MM-dd HH:mm:ss)
			 */
			function formatNormal(d) {
				return (
					d.getFullYear() +
					"-" +
					String(d.getMonth() + 1).padStart(2, "0") +
					"-" +
					String(d.getDate()).padStart(2, "0") +
					" " +
					String(d.getHours()).padStart(2, "0") +
					":" +
					String(d.getMinutes()).padStart(2, "0") +
					":" +
					String(d.getSeconds()).padStart(2, "0")
				);
			}

			// Get browser timezone information
			let browserTz = Intl.DateTimeFormat().resolvedOptions().timeZone; // Timezone name, e.g. "Europe/Copenhagen"
			let offsetMin = -new Date().getTimezoneOffset(); // Timezone offset (minutes)
			let sign = offsetMin >= 0 ? "+" : "-"; // Offset sign
			let absMin = Math.abs(offsetMin); // Offset absolute value
			let offsetStr =
				sign +
				String(Math.floor(absMin / 60)).padStart(2, "0") +
				":" +
				String(absMin % 60).padStart(2, "0"); // Format as "+HH:mm"

			/**
			 * Update current time display
			 * Display format: Browser current time: yyyy-MM-dd HH:mm:ss (Timezone name, UTC±HH:mm)
			 */
			function updateCurrentRef() {
				const now = new Date();
				currentRefSpan.textContent =
					"Browser current time: " +
					formatNormal(now) +
					" (" +
					browserTz +
					", UTC " +
					offsetStr +
					")";
			}

			// Display current time immediately
			updateCurrentRef();

			// Update current time every 15 seconds
			setInterval(updateCurrentRef, 15000);

			/**
			 * File list empty state hint
			 * Functionality: shows a hint message when the file list is empty
			 */
			window.addEventListener("DOMContentLoaded", function () {
				var fileList = document.getElementById("file-list");
				var noFiles = document.getElementById("no-files");

				// Check if the file list is empty, and show a hint if so
				if (fileList && noFiles && fileList.innerText.trim() === "") {
					noFiles.textContent = "No files published.";
				}
			});
		</script>
	</body>
</html>
