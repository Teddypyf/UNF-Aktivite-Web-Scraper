<!--
    UNF 活动日历订阅页面
    功能:展示 UNF 各地区活动的 ICS 日历订阅链接,显示数据更新时间和当前时间
-->
<html lang="zh-cn">
	<head>
		<meta charset="UTF-8" />
		<title>Last Update Time</title>
		<style>
			/* 页面基础样式 */
			body {
				font-family: Arial, sans-serif;
				margin: 40px;
			}

			/* 更新时间显示样式 - 蓝色大字 */
			.update-time {
				font-size: 1.5em;
				color: #2d8cf0;
			}

			/* ICS 链接标签样式 - 固定宽度对齐 */
			label {
				display: inline-block;
				width: 200px;
			}

			/* 只读输入框样式 - 底部间距 */
			input[readonly] {
				margin-bottom: 6px;
			}

			/* 表格样式 - 边框合并 */
			table {
				border-collapse: collapse;
				margin-top: 10px;
			}
			th,
			td {
				border: 1px solid #ccc;
				padding: 4px 8px;
				font-size: 14px;
			}
			th {
				background: #f5f5f5;
			}

			/* 夜间模式 - 18:00-6:00 自动启用 */
			body.dark-mode {
				background: #1a1a1a;
				color: #e0e0e0;
			}
			body.dark-mode .update-time {
				color: #5dade2;
			}
			body.dark-mode input[readonly] {
				background: #2d2d2d;
				color: #e0e0e0;
				border: 1px solid #444;
			}
			body.dark-mode th,
			body.dark-mode td {
				border-color: #444;
			}
			body.dark-mode th {
				background: #2d2d2d;
			}
		</style>
	</head>
	<body>
		<script>
			// 检测时间并自动启用夜间模式 (18:00-6:00)
			const hour = new Date().getHours();
			if (hour >= 18 || hour < 6) {
				document.body.classList.add("dark-mode");
			}
		</script>
		<h1>UNF-Aktivite-ics</h1>

		<!-- 数据最后更新时间区域 - 显示爬虫最后抓取数据的时间 -->
		<h2>Data Last Update Time</h2>
		<div class="update-time" id="update-time">
			<!-- 哥本哈根时间由 Python 后端脚本插入 -->
			<span id="last-update">Copenhagen: 2026-03-21 12:00:00</span>
		</div>

		<!-- 当前时间区域 - 显示用户浏览器的本地时间和时区 -->
		<h2>Current Time</h2>
		<div style="font-size: 1.2em; color: #52c41a; margin-bottom: 20px">
			<!-- 当前时间每分钟自动更新 -->
			<span id="current-time-ref"></span>
		</div>

		<!-- ICS 订阅链接区域 - 动态生成各地区的日历订阅链接 -->
		<h2>ICS subscription links</h2>
		<div
			id="pizza_info"
			style="
				margin-bottom: 20px;
				font-size: 14px;
				padding: 10px;
				background-color: #f9f9f9;
				border-left: 4px solid #2d8cf0;
				border-radius: 4px;
				display: none;
			"
		>
			<strong>🍕 Pizza Info:</strong> Some events show a pizza indicator based
			on the number of registered volunteers (Vagter).<br />
			🍕🟢 &lt; 6 Vagter &nbsp;|&nbsp; 🍕🟠 6-7 Vagter &nbsp;|&nbsp; 🍕🔴 &ge; 8
			Vagter
		</div>
		<div id="ics-links"></div>

		<!-- 已发布文件列表区域 - 由 Python 脚本动态插入文件列表 -->
		<h2>Published Files</h2>
		<div id="file-list">
			<!-- FILE_LIST_START -->
			<span id="no-files" style="color: #888"></span>
			<!-- FILE_LIST_END -->
		</div>

		<script>
			/**
			 * 自动刷新功能
			 * 每 5 分钟 (300000 毫秒) 自动刷新页面,确保显示最新数据
			 */
			setInterval(function () {
				location.reload();
			}, 300000);

			/**
			 * ICS 订阅链接生成器
			 * 功能:动态生成各个 UNF 地区的日历订阅链接
			 * 注意:文件名需要与 Python 脚本生成的文件名保持同步
			 */

			// UNF 各地区配置 - slug 用于生成文件名,name 用于显示
			const icsFiles = [
				{ slug: "kbh", name: "UNF København" }, // 哥本哈根
				{ slug: "lyngby", name: "UNF Lyngby" }, // 灵比
				{ slug: "aarhus", name: "UNF Aarhus" }, // 奥胡斯
				{ slug: "odense", name: "UNF Odense" }, // 欧登塞
				{ slug: "aalborg", name: "UNF Aalborg" }, // 奥尔堡
				{ slug: "danmark", name: "UNF Danmark" }, // 全丹麦
				{ slug: "all", name: "ALLE Arrangementer" },
			];

			// GitHub Pages 基础 URL
			const baseUrl = `https://teddypyf.github.io/UNF-Aktivite-Web-Scraper/`;

			// 生成 HTML:每个地区一个标签和一个可点击选中的只读输入框
			let html = "";
			icsFiles.forEach((f, i) => {
				// No pizza link
				const fname = `unf_events_${f.slug}.ics`;
				html += `<div><label for="ics-link${i}">${f.name}:</label>`;
				html += `<input id="ics-link${i}" type="text" value="${baseUrl}${fname}" readonly style="width:500px;" onclick="this.select()" />`;
				html += `<button type="button" onclick="navigator.clipboard.writeText(document.getElementById('ics-link${i}').value)">copy link</button></div>`;

				// Pizza link
				const fname_pizza = `unf_events_${f.slug}_pizza.ics`;
				html += `<div style="margin-bottom: 12px;"><label for="ics-link${i}_pizza">${f.name} <a href="#pizza_info" onclick="document.getElementById('pizza_info').style.display='block'">(pizza_info)</a>:</label>`;
				html += `<input id="ics-link${i}_pizza" type="text" value="${baseUrl}${fname_pizza}" readonly style="width:500px;" onclick="this.select()" />`;
				html += `<button type="button" onclick="navigator.clipboard.writeText(document.getElementById('ics-link${i}_pizza').value)">copy link</button></div>`;
			});

			// 将生成的链接插入到页面中
			document.getElementById("ics-links").innerHTML = html;
		</script>
		<script>
			/**
			 * 时间格式化和实时显示当前时间模块
			 */

			// 获取页面元素
			const currentRefSpan = document.getElementById("current-time-ref"); // 当前时间显示元素

			/**
			 * 时间格式化函数
			 * @param {Date} d - 日期对象
			 * @returns {string} 格式化后的时间字符串 (yyyy-MM-dd HH:mm:ss)
			 */
			function formatNormal(d) {
				return (
					d.getFullYear() +
					"-" +
					String(d.getMonth() + 1).padStart(2, "0") +
					"-" +
					String(d.getDate()).padStart(2, "0") +
					" " +
					String(d.getHours()).padStart(2, "0") +
					":" +
					String(d.getMinutes()).padStart(2, "0") +
					":" +
					String(d.getSeconds()).padStart(2, "0")
				);
			}

			// 获取浏览器时区信息
			let browserTz = Intl.DateTimeFormat().resolvedOptions().timeZone; // 时区名称,如 "Europe/Copenhagen"
			let offsetMin = -new Date().getTimezoneOffset(); // 时区偏移 (分钟)
			let sign = offsetMin >= 0 ? "+" : "-"; // 偏移符号
			let absMin = Math.abs(offsetMin); // 偏移绝对值
			let offsetStr =
				sign +
				String(Math.floor(absMin / 60)).padStart(2, "0") +
				":" +
				String(absMin % 60).padStart(2, "0"); // 格式化为 "+HH:mm"

			/**
			 * 更新当前时间显示
			 * 显示格式:Browser current Time: yyyy-MM-dd HH:mm:ss (时区名称,UTC±HH:mm)
			 */
			function updateCurrentRef() {
				const now = new Date();
				currentRefSpan.textContent =
					"Browser current time: " +
					formatNormal(now) +
					" (" +
					browserTz +
					", UTC " +
					offsetStr +
					")";
			}

			// 立即显示当前时间
			updateCurrentRef();

			// 每15秒 更新一次当前时间
			setInterval(updateCurrentRef, 15000);

			/**
			 * 文件列表空状态提示
			 * 功能:当文件列表为空时,显示提示信息
			 */
			window.addEventListener("DOMContentLoaded", function () {
				var fileList = document.getElementById("file-list");
				var noFiles = document.getElementById("no-files");

				// 检查文件列表是否为空,如果为空则显示提示
				if (fileList && noFiles && fileList.innerText.trim() === "") {
					noFiles.textContent = "No files published.";
				}
			});
		</script>
	</body>
</html>
